settings:
  # Menu inicial que abre /social.
  # Se busca en plugins/MDVSocial/Menus/<nombre>.yml
  start-menu: main

  # Si esto esta true, la tienda de titulos usara Vault/Economy.
  use-vault-economy: true

  # Sistema de titulo obligatorio.
  # Si mandatory-title esta true, el jugador siempre tendra un titulo activo.
  # Si no tiene ninguno guardado, se usara default-title.
  mandatory-title: true

  # Si esta false, /titulo quitar y el boton de quitar no eliminan el titulo actual.
  allow-clear-title: false

  # Titulo base para jugadores nuevos o Forasteros.
  # Se muestra como prefijo mientras no tengan otro titulo activo.
  # No hace falta desbloquearlo ni guardarlo en player-data.yml.
  default-title: forastero

  # Titulos desbloqueados para todos los jugadores sin necesidad de guardarlos en player-data.yml.
  default-unlocked-titles:
    - aventurero

  # El titulo por defecto no aparece en menus/listas.
  # Esto evita que el jugador pueda volver a equiparse Forastero desde el menu.
  hide-default-title-in-menus: true

  # Otros titulos ocultos de menus.
  hidden-titles:
    - forastero

  # PlaceholderAPI:
  # %mdvsocial_title% = nombre visible sin colores raros finales
  # %mdvsocial_title_colored% = nombre visible con colores
  # %mdvsocial_title_prefix% = prefijo completo, ejemplo &8[Vagabundo]&r
  # %mdvsocial_active_title% = id interno del titulo activo
  # %mdvsocial_unlocked_titles% = cantidad de titulos desbloqueados por data
  #
  # Scoreboard party inteligente:
  # Si el jugador no esta en party, estos placeholders devuelven vacio.
  # %mdvsocial_party_header% = &dGrupo: actual/max
  # %mdvsocial_party_member_1% ... %mdvsocial_party_member_5% = miembros del grupo
  # %mdvsocial_party_count% = cantidad actual
  # %mdvsocial_party_max% = maximo configurado
  # %mdvsocial_party_members% = miembros separados por coma
  # %mdvsocial_party_in_group% = true/false
  # %mdvsocial_party_spacer% = linea espaciadora solo si estas en party

  # Comandos opcionales al equipar/quitar titulo.
  # Se ejecutan desde consola. Puedes dejarlos vacios.
  # Placeholders: {player}, {title_id}, {title_display}, {title_prefix}
  commands-on-title-equip: []
  commands-on-title-clear: []

  # Si un jugador tiene un titulo activo pero ya no cumple permiso/requisito,
  # el placeholder no lo mostrara.
  hide-invalid-active-title: true

  # Titulo que se equipa cuando el titulo activo deja de estar desbloqueado
  # por expiracion de rango, retiro de permiso o eliminacion manual.
  invalid-title-fallback: aventurero

  active-title-validation:
    enabled: true
    interval-ticks: 100

# Titulos obligatorios aplicados por staff. Mientras uno esta activo,
# el jugador no puede equipar ni quitar otros titulos.
punishment-titles:
  enabled: true
  default-title: pecador

# ==========================================================
# Correo y buzon
# ==========================================================
mail:
  enabled: true
  max-message-length: 180
  expire-after-days: 10
  cleanup-interval-minutes: 30
  allow-unknown-targets: false
  name-suggestions-limit: 5
  date-format: 'dd/MM/yyyy HH:mm'
  never-expires-text: 'Nunca'

  default-mailbox-size: 10
  mailbox-size-permissions:
    'mdvsocial.mailbox.20': 20
    'mdvsocial.mailbox.30': 30
    'mdvsocial.mailbox.50': 50

  server-author-name: 'MDVCRAFT'
  server-mail-expire-days: 30
  server-mail-ignore-mailbox-limit: true

  # Se entrega una sola vez por id. Para volver a entregar una bienvenida
  # nueva a futuros jugadores, cambia el id (por ejemplo bienvenida-v2).
  welcome:
    enabled: true
    id: 'bienvenida-v1'
    only-first-join: true
    author-name: 'MDVCRAFT'
    message: '¡Bienvenido a MDVCRAFT! Revisa /social para conocer tus hogares, títulos, correo, amigos y demás sistemas.'
    expire-days: 3
    ignore-mailbox-limit: true

  clan-invites:
    ignore-mailbox-limit: true

  menus:
    mailbox:
      title: '&8Buzón {page}/{max_page} &7({count}/{limit})'
      size: 54
      slots: [10,11,12,13,14,15,16,19,20,21,22,23,24,25,28,29,30,31,32,33,34,37,38,39,40,41,42,43]
    read:
      title: '&8Carta de {sender}'
      size: 27
      letter-slot: 13
      back-slot: 11
      reply-slot: 14
      delete-slot: 15
      block-slot: 16

  items:
    empty:
      name: '&7Buzón vacío'
      lore:
        - '&8No tienes cartas guardadas.'
    reply:
      material: WRITABLE_BOOK
      name: '&aResponder'
      lore:
        - '&7Escribe una respuesta al remitente.'
    delete:
      material: LAVA_BUCKET
      name: '&cEliminar carta'
      lore:
        - '&7Elimina esta carta de tu buzón.'
    block-sender:
      material: BARRIER
      name: '&cBloquear remitente'
      lore:
        - '&7Impide recibir nuevas cartas de este jugador.'
    clan-invite-accept:
      material: LIME_DYE
      name: '&a&lAceptar invitación'
    clan-invite-reject:
      material: RED_DYE
      name: '&c&lRechazar invitación'


# ==========================================================
# MDVSocial Core UI
#
# Esta seccion convierte MDVSocial en una base visual comun para
# otros plugins propios: MDVRecetas, MDVTrades, MDVClans, MDVSpawn, etc.
# Los otros plugins pueden usar la API de MDVSocial para crear botones,
# inventarios y reproducir sonidos comunes sin repetir logica.
#
# Formatos validos de sonido:
#   sound: UI_BUTTON_CLICK
#   sound: UI_BUTTON_CLICK;0.6;1.2   # sonido;volumen;pitch
#   o seccion con sound/volume/pitch
# ==========================================================
ui-core:
  sounds:
    enabled: true

    default:
      sound: UI_BUTTON_CLICK
      volume: 0.6
      pitch: 1.2

    open:
      sound: UI_BUTTON_CLICK
      volume: 0.65
      pitch: 1.35

    back:
      sound: UI_BUTTON_CLICK
      volume: 0.55
      pitch: 0.85

    close:
      sound: BLOCK_CHEST_CLOSE
      volume: 0.55
      pitch: 1.15

    page:
      sound: ITEM_BOOK_PAGE_TURN
      volume: 0.7
      pitch: 1.15

    confirm:
      sound: ENTITY_EXPERIENCE_ORB_PICKUP
      volume: 0.65
      pitch: 1.25

    danger:
      sound: ENTITY_VILLAGER_NO
      volume: 0.6
      pitch: 0.85

    invalid:
      sound: BLOCK_NOTE_BLOCK_BASS
      volume: 0.65
      pitch: 0.65

    # Overrides por accion interna. Si no existe override, usa la categoria superior.
    actions:
      CLOSE:
        sound: BLOCK_CHEST_CLOSE
        volume: 0.55
        pitch: 1.15
      BACK:
        sound: UI_BUTTON_CLICK
        volume: 0.55
        pitch: 0.85
      NEXT_PAGE:
        sound: ITEM_BOOK_PAGE_TURN
        volume: 0.7
        pitch: 1.15
      PREVIOUS_PAGE:
        sound: ITEM_BOOK_PAGE_TURN
        volume: 0.7
        pitch: 0.95
      OPEN_MENU:
        sound: UI_BUTTON_CLICK
        volume: 0.65
        pitch: 1.35
      OPEN_CONDITIONAL_MENU:
        sound: UI_BUTTON_CLICK
        volume: 0.65
        pitch: 1.35
      MDVCLANS_OPEN:
        sound: UI_BUTTON_CLICK
        volume: 0.65
        pitch: 1.2


# ==========================================================
# Item fijo del menu social
#
# Slot 8 = noveno slot visible de la hotbar.
# Si enabled esta true, el item queda bloqueado en ese slot:
# no se puede mover, dropear, transferir, meter en cofres,
# poner en otras UIs ni perder al morir.
#
# Si el slot esta ocupado al activarlo, el item anterior se dropea
# al suelo y se coloca el Sello del Viajero.
# ==========================================================
social-menu-item:
  enabled: true
  slot: 8
  command: social
  check-interval-seconds: 5
  drop-replaced-item: true
  remove-extra-copies: true
  remove-when-disabled: false
  material: COMPASS
  name: '&6&lSello del Viajero'
  lore:
    - '&7Un sello entregado a todo forastero'
    - '&7que llega a las tierras de MDVCRAFT.'
    - ''
    - '&eClick derecho &7para abrir el menu social.'
  glowing: true
  custom-model-data: 0


# ==========================================================
# Menu de casas personales
#
# Usa Essentials como backend real:
# - Click en una casa: ejecuta /home <home>
# - Click izquierdo en establecer: ejecuta /sethome <home>
# - Click derecho o shift derecho en establecer: ejecuta /delhome <home>
#
# El menu lee las homes reales desde plugins/Essentials/userdata/<uuid>.yml.
# Si un jugador creó /sethome mina o /sethome casacaca, aparecerá con ese nombre.
# ==========================================================
homes-menu:
  enabled: true
  use-permission: 'mdvsocial.homes.use'
  title: '&8Casas &8- &6&l{player}'
  size: 54
  max-visible-homes: 4
  default-home-name-format: 'casa{number}'
  essentials-userdata-path: 'plugins/Essentials/userdata'
  sort-homes-by-name: false
  close-on-action: true

  max-homes:
    default: 1
    permission-limits:
      - permission: 'mdvsocial.homes.2'
        homes: 2
      - permission: 'mdvsocial.homes.3'
        homes: 3
      - permission: 'mdvsocial.homes.4'
        homes: 4

  # Conserva los hogares que exceden el límite cuando expira un rango,
  # pero bloquea su uso hasta recuperar el permiso correspondiente.
  suspended-homes:
    enabled: true
    mode: LOCK_EXCESS
    restore-on-upgrade: true
    allow-delete-locked: true
    bypass-permission: 'mdvsocial.homes.lock.bypass'
    preferred-home-names:
      - casa1
      - casa2
      - casa3
      - casa4
    intercept-commands:
      - home
      - ehome
      - 'essentials:home'
      - 'essentials:ehome'

  commands:
    teleport: 'home {home_name}'
    set: 'sethome {home_name}'
    delete: 'delhome {home_name}'

  status-text:
    established: '&aEstablecida'
    missing: '&cNo establecida'
    locked: '&cBloqueada'
    suspended: '&cSuspendida'

  messages:
    disabled: '&cEl menu de casas esta desactivado.'
    no-permission: '&cNo tienes permiso para usar el menu de casas.'
    only-players: '&cSolo jugadores.'
    home-not-set: '&cEse hogar aun no esta establecido.'
    home-suspended: '&cEl hogar &e{home} &cesta suspendido porque supera tu limite actual de &e{max_homes}&c.'
    all-homes-locked: '&cTodos tus hogares estan suspendidos. Recupera un limite mayor o elimina uno.'
    locked-delete-hint: '&eUsa click derecho para eliminar el hogar suspendido &6{home}&e.'

  items:
    # Si enabled está en false, los slots que no se usan quedan vacíos.
    # Si lo pones true, se rellena el menú con el material indicado.
    filler:
      enabled: false
      material: BLACK_STAINED_GLASS_PANE
      name: ' '
      lore: []

    info:
      slot: 13
      material: LODESTONE
      name: '&6&lHogares personales'
      lore:
        - ''
        - '&5&l● &7&lInformación de Hogares'
        - '&7Hogares establecidos: &e{homes}'
        - '&7Hogares activos: &a{active_homes}'
        - '&7Hogares suspendidos: &c{locked_homes}'
        - '&7Límite actual: &e{max_homes}'
        - ''
        - '&8Usa los botones de la izquierda'
        - '&8para viajar a tus hogares.'
        - ''
        - '&8Usa los botones de la derecha'
        - '&8para establecer o eliminar hogares.'

    teleport:
      slot-1: 10
      slot-2: 19
      slot-3: 28
      slot-4: 37

      available:
        material: ENDER_PEARL
        name: '&5&lIr a {home_display}'
        lore:
          - ''
          - '&5&l● &7&lInformación'
          - '&7Estado: {home_status}'
          - '&7Nombre: &e{home_name}'
          - '&7Coordenadas: &e{home_x}&7, &e{home_y}&7, &e{home_z}'
          - '&7Mundo: &e{home_world}'
          - ''
          - '&eClick para teletransportarte.'

      missing:
        material: GRAY_DYE
        name: '&7&lHogar {home_number}'
        lore:
          - ''
          - '&7Estado: &cNo establecido'
          - ''
          - '&8Aún no tienes un hogar'
          - '&8guardado en este espacio.'
          - ''
          - '&8Usa el botón de la derecha'
          - '&8para establecerlo.'

      locked:
        material: BARRIER
        name: '&c&l{home_display} suspendido'
        lore:
          - ''
          - '&7Estado: &cSuspendido'
          - '&7Nombre: &e{home_name}'
          - '&7Coordenadas: &e{home_x}&7, &e{home_y}&7, &e{home_z}'
