name: MDVSocial
version: 1.4.1
main: com.mdvcraft.mdvsocial.MDVSocialPlugin
api-version: '1.21'
author: MDVCRAFT
softdepend: [PlaceholderAPI, Vault, LuckPerms, MMOCore, MMOItems, Essentials, MDVClans]
commands:
  social:
    description: Abre el menu social de MDVCRAFT.
    usage: /social
    aliases: [mdvsocialmenu, sociedad]
  titulos:
    description: Abre el menu de titulos.
    usage: /titulos
    aliases: [titulo, titles, title]
  mdvsocial:
    description: Comando administrativo de MDVSocial.
    usage: /mdvsocial
  correo:
    description: Abre el sistema de cartas de MDVSocial.
    usage: /correo
    aliases: [mailmdv, buzon]
  carta:
    description: Envia y administra cartas de MDVSocial.
    usage: /carta
    aliases: [cartas]
  casa:
    description: Abre el menu de casas personales.
    usage: /casa
    aliases: [casas, hogar, hogares]
  mdvadmin:
    description: Abre el menu central de administracion.
    usage: /mdvadmin
    aliases: [ma]
  mdvitems:
    description: Abre la biblioteca segura de MMOItems.
    usage: /mdvitems
    aliases: [itemsstaff, bibliotecaitems]
permissions:
  mdvsocial.use:
    description: Permite usar /social y /titulos.
    default: true
  mdvsocial.admin:
    description: Permite administrar MDVSocial.
    default: op
  mdvsocial.admin-menu:
    description: Permite abrir el menu central de administracion.
    default: op
  mdvsocial.item-browser:
    description: Permite usar la biblioteca segura de MMOItems.
    default: op

  mdvsocial.mail.use:
    description: Permite usar el sistema de cartas.
    default: true
  mdvsocial.mail.read:
    description: Permite leer el buzon de cartas.
    default: true
  mdvsocial.mail.send:
    description: Permite enviar cartas.
    default: true
  mdvsocial.mail.delete:
    description: Permite eliminar cartas propias.
    default: true

  mdvsocial.homes.use:
    description: Permite usar el menu de casas personales.
    default: true
  mdvsocial.homes.lock.bypass:
    description: Permite usar hogares suspendidos por superar el limite actual.
    default: op
