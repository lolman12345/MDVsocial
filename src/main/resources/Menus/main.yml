# ==========================================================
# MDVSocial - Menu modular principal
# Acciones disponibles: OPEN_MENU / OPEN_CONDITIONAL_MENU / MDVCLANS_OPEN / COMMAND_PLAYER / BACK / CLOSE
# ==========================================================
title: '&8MDVSocial'
size: 27
items:
  titulos:
    slot: 11
    material: NAME_TAG
    name: '&eTitulos y rangos'
    lore:
      - '&7Compra, equipa o revisa titulos.'
      - '&eClick para abrir.'
    action: OPEN_TITLES

  clan:
    slot: 13
    material: GREEN_BANNER
    use-clan-banner: true
    name: '&aClan'
    lore:
      - '&7Abre el menu de clan.'
      - '&8Si tienes clan, muestra su banner.'
      - '&eClick para abrir.'
    action: OPEN_CONDITIONAL_MENU
    condition-placeholder: '%mdvclans_is_in_clan%'
    condition-equals: 'true'
    true-menu: clan_con_clan
    false-menu: clan_sin_clan

  ayuda:
    slot: 15
    material: BOOK
    name: '&bAyuda social'
    lore:
      - '&7Comandos sociales utiles.'
      - '&eClick para abrir.'
    action: OPEN_MENU
    target-menu: ayuda

  cerrar:
    slot: 26
    material: BARRIER
    name: '&cCerrar'
    action: CLOSE
