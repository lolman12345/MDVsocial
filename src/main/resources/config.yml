  mail-cannot-reply-server: '&cNo puedes responder cartas oficiales de MDVCRAFT.'

settings:
  # Menu inicial que abre /social.
  # Se busca en plugins/MDVSocial/Menus/<nombre>.yml
  start-menu: main

  # Si esto esta true, la tienda de titulos usara Vault/Economy.
  use-vault-economy: true

  # Sistema de titulo obligatorio.
  # Si mandatory-title esta true, el jugador siempre tendra un titulo activo.
  # Si no tiene ninguno guardado, se usara default-title.
  mandatory-title: true

  # Si esta false, /titulo quitar y el boton de quitar no eliminan el titulo actual.
  allow-clear-title: false

  # Titulo base para jugadores nuevos o Forasteros.
  # Se muestra como prefijo mientras no tengan otro titulo activo.
  # No hace falta desbloquearlo ni guardarlo en player-data.yml.
  default-title: forastero

  # Titulos desbloqueados para todos los jugadores sin necesidad de guardarlos en player-data.yml.
  default-unlocked-titles:
    - aventurero

  # El titulo por defecto no aparece en menus/listas.
  # Esto evita que el jugador pueda volver a equiparse Forastero desde el menu.
  hide-default-title-in-menus: true

  # Otros titulos ocultos de menus.
  hidden-titles:
    - forastero

  # PlaceholderAPI:
  # %mdvsocial_title% = nombre visible sin colores raros finales
  # %mdvsocial_title_prefix% = prefijo completo, ejemplo &8[Vagabundo]&r
  # %mdvsocial_active_title% = id interno del titulo activo
  # %mdvsocial_unlocked_titles% = cantidad de titulos desbloqueados por data

  # Comandos opcionales al equipar/quitar titulo.
  # Se ejecutan desde consola. Puedes dejarlos vacios.
  # Placeholders: {player}, {title_id}, {title_display}, {title_prefix}
  commands-on-title-equip: []
  commands-on-title-clear: []

  # Si un jugador tiene un titulo activo pero ya no cumple permiso/requisito,
  # el placeholder no lo mostrara.
  hide-invalid-active-title: true

