# ==========================================================
# MDVSocial 1.1.0
# Menu social + sistema de titulos cosmeticos para MDVCRAFT
# ==========================================================

messages:
  prefix: '&6&l[&5&lMDVSocial&6&l]&4> &r'
  no-permission: '&cNo tienes permiso.'
  only-players: '&cEste comando solo puede usarlo un jugador.'
  reloaded: '&aMDVSocial recargado.'
  title-equipped: '&eAhora usas el titulo {title}&e.'
  title-cleared: '&eYa no usas ningun titulo.'
  title-bought: '&aCompraste el titulo {title}&a.'
  not-enough-money: '&cNo tienes monedas suficientes. Precio: &e{price}&c.'
  already-owned: '&cYa tienes este titulo.'
  title-locked: '&cNo tienes este titulo desbloqueado.'
  title-not-found: '&cEse titulo no existe.'
  player-not-found: '&cJugador no encontrado.'
  given-title: '&aTitulo entregado correctamente.'
  removed-title: '&eTitulo removido correctamente.'
  boss-radius-given: '&aTitulo entregado a &e{amount} &ajugadores cercanos.'

settings:
  # Menu inicial que abre /social.
  # Se busca en plugins/MDVSocial/Menus/<nombre>.yml
  start-menu: main

  # Si esto esta true, la tienda de titulos usara Vault/Economy.
  use-vault-economy: true

  # PlaceholderAPI:
  # %mdvsocial_title% = nombre visible sin colores raros finales
  # %mdvsocial_title_prefix% = prefijo completo, ejemplo &8[Vagabundo]&r
  # %mdvsocial_active_title% = id interno del titulo activo
  # %mdvsocial_unlocked_titles% = cantidad de titulos desbloqueados por data

  # Comandos opcionales al equipar/quitar titulo.
  # Se ejecutan desde consola. Puedes dejarlos vacios.
  # Placeholders: {player}, {title_id}, {title_display}, {title_prefix}
  commands-on-title-equip: []
  commands-on-title-clear: []

  # Si un jugador tiene un titulo activo pero ya no cumple permiso/requisito,
  # el placeholder no lo mostrara.
  hide-invalid-active-title: true

menus:
  main:
    title: '&8MDVSocial'
    size: 27
  titles:
    title: '&8Titulos y rangos'
    size: 27
  my-titles:
    title: '&8Mis titulos'
    size: 54
  title-shop:
    title: '&8Tienda de titulos'
    size: 54
  locked-titles:
    title: '&8Titulos bloqueados'
    size: 54
  ranks:
    title: '&8Rangos'
    size: 54

items:
  filler:
    material: BLACK_STAINED_GLASS_PANE
    name: ' '
  back:
    material: ARROW
    name: '&eVolver'
    lore:
      - '&7Regresa al menu anterior.'
  close:
    material: BARRIER
    name: '&cCerrar'
  next-page:
    material: SPECTRAL_ARROW
    name: '&ePagina siguiente'
  previous-page:
    material: ARROW
    name: '&ePagina anterior'
  clear-title:
    material: MILK_BUCKET
    name: '&fQuitar titulo'
    lore:
      - '&7Deja de mostrar tu titulo actual.'
      - '&eClick para quitarlo.'

main-menu:
  titles:
    slot: 11
    material: NAME_TAG
    name: '&eTitulos y rangos'
    lore:
      - '&7Compra, equipa o revisa titulos.'
      - '&eClick para abrir.'
  clan:
    slot: 13
    material: SHIELD
    name: '&aClan'
    lore:
      - '&7Modulo reservado para Clanes v2.'
      - '&8Por ahora ejecuta /clan.'
    commands:
      - 'clan'
  social:
    slot: 15
    material: PLAYER_HEAD
    name: '&bAmigos y correo'
    lore:
      - '&7Modulo reservado para MDVSocial futuro.'
      - '&7Por ahora usa /friends y /mail.'
    commands:
      - 'friends'

titles-menu:
  my-titles:
    slot: 10
    material: CHEST
    name: '&aMis titulos'
    lore:
      - '&7Mira los titulos que tienes.'
      - '&eClick para abrir.'
  shop:
    slot: 12
    material: EMERALD
    name: '&eTienda de titulos'
    lore:
      - '&7Compra titulos con monedas.'
      - '&eClick para abrir.'
  locked:
    slot: 14
    material: IRON_BARS
    name: '&cTitulos bloqueados'
    lore:
      - '&7Mira titulos que aun no tienes.'
      - '&eClick para abrir.'
  ranks:
    slot: 16
    material: GOLDEN_HELMET
    name: '&6Rangos'
    lore:
      - '&7Mira rangos y beneficios esteticos.'
      - '&eClick para abrir.'
  clear:
    slot: 22

