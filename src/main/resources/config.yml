      name: '&6&lVolver'
      lore:
        - '&7Regresa al menú social.'

# ==========================================================
# Opciones de amigos externos MMOCore
# Permite abrir un menú MDVSocial al hacer click izquierdo
# sobre un amigo en la lista de /friends.
# El click derecho queda libre para que MMOCore elimine amigos.
#
# target-menu debe existir en plugins/MDVSocial/Menus/<target-menu>.yml
# Placeholders disponibles en ese menú:
# {target}, {target_name}, {target_uuid}, {target_status}, {target_online}
#
# party.when-no-party:
# - message: solo avisa que debes crear party primero
# - create-and-invite: crea party automáticamente y luego invita
# ==========================================================
social-friend-options:
  enabled: true
  title: 'Libreta de Compañeros'
  title-contains: ''
  click: LEFT
  cancel-event: true
  sound: open
  target-menu: amigo_opciones
  slots: [10,11,12,13,14,15,16,19,20,21,22,23,24,25,28,29,30,31,32,33,34]
  party:
    when-no-party: message
    max-members: 5

# ==========================================================
# Puentes para GUIs externas
# Permite que MDVSocial detecte clicks en GUIs de otros plugins
# y ejecute comandos como /social main o /social perfil.
#
# title: nombre exacto del inventario, sin colores.
# title-contains: alternativa si quieres detectar por texto parcial.
# slot/slots: casilla del boton dentro del inventario superior.
# commands: se ejecutan como jugador.
# console-commands: se ejecutan desde consola.
# sound: sonido opcional de ui-core.sounds. Ej: open, back, close, page.
# ==========================================================
external-gui-actions:
  mmocore-friends-main:
    enabled: false
    title: 'Friends'
    slot: 45
    close-on-click: true
    cancel-event: true
    sound: back
    commands:
      - 'social main'

  mmocore-profile-perfil:
    enabled: false
    title-contains: 'Profile'
    slot: 49
    close-on-click: true
    cancel-event: true
    sound: open
    commands:
      - 'social perfil'

