# Reparación barata para AnimatedScoreboard.
# Solo ejecuta el comando si el jugador no tiene objetivo SIDEBAR.
scoreboard-repair:
  enabled: true
  command: 'animatedsb toggle {player}'
  cooldown-seconds: 15
