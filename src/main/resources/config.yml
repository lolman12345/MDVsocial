# ==========================================================
# Sistema de cartas MDVSocial
# ==========================================================
mail:
  enabled: true
  expire-after-days: 10
  cleanup-interval-minutes: 30
  default-mailbox-size: 10
  max-message-length: 180
  allow-unknown-targets: false

  # Cantidad de nombres sugeridos cuando se escribe mal un jugador.
  name-suggestions-limit: 5

  # Cartas enviadas por consola/admin a todos.
  server-author-name: 'MDVCRAFT'
  server-mail-expire-days: 30
  server-mail-ignore-mailbox-limit: true
  never-expires-text: 'no expira'

  mailbox-size-permissions:
    mdvsocial.mailbox.15: 15
    mdvsocial.mailbox.25: 25
    mdvsocial.mailbox.50: 50

  date-format: 'dd/MM HH:mm'

  menus:
    mailbox:
      title: '&8&lBuzon &7{count}/{limit}'
      size: 54
      slots:
        - 10
        - 11
        - 12
        - 13
        - 14
        - 15
        - 16
        - 19
        - 20
        - 21
        - 22
        - 23
        - 24
        - 25
        - 28
        - 29
        - 30
        - 31
        - 32
        - 33
        - 34
        - 37
        - 38
        - 39
        - 40
        - 41
        - 42
        - 43
    read:
      title: '&8Carta de {sender}'
      size: 27
      back-slot: 11
      letter-slot: 13
      reply-slot: 14
      delete-slot: 15
      block-slot: 16

  items:
    empty:
      name: '&7Buzon vacio'
      lore:
        - '&8No tienes cartas guardadas.'
    reply:
      material: WRITABLE_BOOK
      name: '&e&lResponder carta'
      lore:
        - '&7Responde directamente al jugador'
        - '&7que te envio esta carta.'
        - '&8Se cerrara el menu y escribiras en chat.'
    delete:
      material: RED_DYE
      name: '&c&lEliminar carta'
      lore:
        - '&7Elimina esta carta de tu buzon.'
        - '&8Esta accion no se puede deshacer.'
    block-sender:
      material: BARRIER
      name: '&c&lBloquear remitente'
      lore:
        - '&7Bloquea a este jugador para que'
        - '&7no pueda enviarte mas cartas.'

# ==========================================================
# Puentes para GUIs externas
# Permite que MDVSocial detecte clicks en GUIs de otros plugins
# y ejecute comandos como /social main o /social perfil.
#
# title: nombre exacto del inventario, sin colores.
# title-contains: alternativa si quieres detectar por texto parcial.
# slot/slots: casilla del boton dentro del inventario superior.
# commands: se ejecutan como jugador.
# console-commands: se ejecutan desde consola.
# ==========================================================
external-gui-actions:
  mmocore-friends-main:
    enabled: false
    title: 'Friends'
    slot: 45
    close-on-click: true
    cancel-event: true
    commands:
      - 'social main'

  mmocore-profile-perfil:
    enabled: false
    title-contains: 'Profile'
    slot: 49
    close-on-click: true
    cancel-event: true
    commands:
      - 'social perfil'

# ==========================================================
# Titulos
# id:
#   display: nombre visible
#   prefix: prefijo para PlaceholderAPI
#   material: item del menu
#   custom-head-texture: ''  # opcional, base64 texture de cabeza
