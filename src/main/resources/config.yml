# ==========================================================
# Titulos
# id:
#   display: nombre visible
#   prefix: prefijo para PlaceholderAPI
#   material: item del menu
#   custom-head-texture: ''  # opcional, base64 texture de cabeza
#   purchasable: true/false
#   price: 500
#   unlock-permission: 'mdvsocial.title.noble' # opcional, para VIP/rangos
#   lore: ...
# ==========================================================

titles:
  vagabundo:
    display: '&7Vagabundo'
    prefix: '&8[Vagabundo]&r '
    material: LEATHER_BOOTS
    purchasable: true
    price: 250
    lore:
      - '&7Para los que caminan sin bandera.'
      - '&ePrecio: &6250 monedas'

  comerciante:
    display: '&6Comerciante'
    prefix: '&6[Comerciante]&r '
    material: EMERALD
    purchasable: true
    price: 1500
    lore:
      - '&7Compra barato, vende caro.'
      - '&ePrecio: &61500 monedas'

  granjero:
    display: '&aGranjero'
    prefix: '&a[Granjero]&r '
    material: WHEAT
    purchasable: true
    price: 600
    lore:
      - '&7El campo tambien alimenta aventuras.'
      - '&ePrecio: &6600 monedas'

  cazador:
    display: '&2Cazador'
    prefix: '&2[Cazador]&r '
    material: BOW
    purchasable: true
    price: 1000
    lore:
      - '&7Rastreador de bestias y caminos.'
      - '&ePrecio: &61000 monedas'

  cazador_maestro:
    display: '&2Cazador Maestro'
    prefix: '&2[Cazador Maestro]&r '
    material: CROSSBOW
    purchasable: false
    lore:
      - '&7Se obtiene por progreso de Cazador.'
      - '&8Ejemplo: MMOCore ejecuta:'
      - '&8/mdvsocial title give <jugador> cazador_maestro'

  noble:
    display: '&6Noble'
    prefix: '&6[Noble]&r '
    material: GOLD_INGOT
    purchasable: false
    unlock-permission: 'mdvsocial.title.noble'
    lore:
      - '&7Titulo estetico de rango premium.'
      - '&7Requiere permiso: &emdvsocial.title.noble'

  caballero:
    display: '&eCaballero'
    prefix: '&e[Caballero]&r '
    material: IRON_SWORD
    purchasable: false
    unlock-permission: 'mdvsocial.title.caballero'
    lore:
      - '&7Titulo estetico de rango premium.'
      - '&7Requiere permiso: &emdvsocial.title.caballero'

  azote_insepultos:
    display: '&5Azote de Insepultos'
    prefix: '&5[Azote de Insepultos]&r '
    material: WITHER_SKELETON_SKULL
    purchasable: false
    lore:
      - '&7Recompensa por derrotar horrores de la noche.'
      - '&8Para boss/evento:'
      - '&8/mdvsocial title give-near world x y z 32 azote_insepultos'

ranks:
  aventurero:
    display: '&aAventurero'
    material: IRON_SWORD
    permission: 'group.aventurero'
    lore:
      - '&7Rango base tras elegir raza.'
      - '&7Estado: {status}'

  vip:
    display: '&bVIP'
    material: DIAMOND
    permission: 'group.vip'
    lore:
      - '&7Rango premium estetico.'
      - '&7Puede desbloquear titulos especiales.'
      - '&7Estado: {status}'

  noble:
    display: '&6Noble'
    material: GOLDEN_HELMET
    permission: 'group.noble'
    lore:
      - '&7Rango premium/rol.'
      - '&7Estado: {status}'
